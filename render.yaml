services:
  # Backend Service
  - type: web
    name: mood-journal-server
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: static
          name: mood-journal-client
          property: url

  # Frontend Service
  - type: static
    name: mood-journal-client
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: mood-journal-server
          property: url
      - key: VITE_API_KEY
        sync: false
